task: train
exp_dir: ./exp/o1_20k/alloc_neighbor/
data_dirs: [./dataset_deepmimo/o1/]
scheme: alloc
iclloc_scheme: ~

num_ant: 32
num_car: 32
max_len_nei: 64
select: neighbor
radius: ~
inv_std: 10000
num_train_data: 20000
num_test_data: 20000

res_mlp:
  hidden_dim: 256
  num_blocks: 2
cnn:
  hidden_size: 32
mfc_net:
  hidden_size: 128
  num_layers: 2
alloc:
  embed_dim: 256
  num_heads: 4
  hidden_dim: 256
  depth: 8
iclloc:
  embed_dim: 256
  num_heads: 4
  hidden_dim: 512
  depth: 8

tensorboard_writer: True
num_epochs: 100000
num_max_steps: 300000
init_lr: 0.0001
lr_decay_steps: [150000,200000,250000]
lr_decay_factor: 0.2
batch_size: 500
mix_train_datasets: True
gen_seq_datasets: True
len_nei_total: 64
len_nei_least: 16
len_nei_test: 64

log_step_inter: 100
save_epoch_inter: 100
test_epoch_inter: 20

finetune: False
finetune_model:
  exp_dir: ~
  epoch: ~